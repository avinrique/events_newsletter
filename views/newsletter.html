<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Newsletter</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/hod.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .newsletter-page-header {
            background: var(--gradient-primary);
            color: var(--color-text-inverse);
            padding: var(--space-5) var(--space-7);
            box-shadow: var(--shadow-sm);
        }

        .newsletter-page-header .brand {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-text-inverse);
            font-weight: 700;
            font-size: var(--fs-lg);
            text-decoration: none;
        }

        .newsletter-page-body {
            max-width: 1080px;
            margin: 0 auto;
            padding: var(--space-7) var(--space-6);
        }

        .newsletter-page-body .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
        }

        @media (max-width: 767.98px) {
            .newsletter-page-body .form-row-3 { grid-template-columns: 1fr; }
        }

        .newsletter-actions-bar {
            position: sticky;
            top: var(--space-3);
            z-index: var(--z-sticky);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-5);
            display: none;
            justify-content: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .newsletter-actions-bar.show { display: flex; }

        @media print {
            .newsletter-page-header,
            .newsletter-selector,
            .newsletter-actions-bar { display: none !important; }
            body { background: white !important; }
            .newsletter-page-body { padding: 0; max-width: none; }
        }

        /* ---------------- Curated newsletter — newspaper style ---------------- */
        .curated-newsletter {
            background: #fffaf3;
            color: #1a1a1a;
            padding: 3rem 3.5rem;
            font-family: 'Georgia', 'Times New Roman', serif;
            line-height: 1.6;
            border-radius: var(--radius-md);
            box-shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(0,0,0,.06);
            max-width: 980px;
            margin: 0 auto;
        }
        .curated-cover img {
            display: block;
            width: calc(100% + 7rem);
            max-height: 320px;
            object-fit: cover;
            margin: -3rem -3.5rem 2.5rem;
            border-radius: var(--radius-md) var(--radius-md) 0 0;
        }
        /* Site theme is dark; force every text node in the curated card to ink-black. */
        .curated-newsletter,
        .curated-newsletter * { color: #1a1a1a; }
        .curated-newsletter .curated-byline,
        .curated-newsletter .curated-subtitle,
        .curated-newsletter .nl-dateline { color: #5a5a5a; }
        .curated-newsletter .curated-summary { color: #333; }
        .curated-newsletter a { color: #1d3557; text-decoration: underline; }

        /* MASTHEAD */
        .curated-rainbow {
            height: 3px;
            background: #1a1a1a;
            margin-bottom: 1rem;
            position: relative;
        }
        .curated-rainbow::after {
            content: ''; position: absolute; left: 0; right: 0; top: 6px;
            height: 1px; background: #1a1a1a;
        }
        .curated-masthead {
            text-align: center;
            border-bottom: 3px double #1a1a1a;
            padding-bottom: 1.25rem;
            margin-bottom: 2rem;
        }
        .curated-title {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 3rem;
            margin: 0 0 .5rem;
            font-weight: 900;
            letter-spacing: -.01em;
            line-height: 1.05;
        }
        .curated-subtitle {
            margin: 0;
            font-style: italic;
            font-size: 1.05rem;
            letter-spacing: .04em;
            text-transform: uppercase;
        }
        .curated-byline {
            margin: .35rem 0 0;
            font-size: .85rem;
            letter-spacing: .05em;
            text-transform: uppercase;
        }
        .curated-summary {
            margin: 1.25rem auto 0;
            max-width: 680px;
            font-size: 1.1rem;
            font-style: italic;
            text-align: center;
            line-height: 1.55;
        }

        /* SECTION HEADERS — "Style section" newspaper look */
        .curated-section { margin: 2.5rem 0; }
        .curated-section-heading {
            font-size: 1rem;
            font-weight: 700;
            margin: 0 0 1rem;
            padding: .35rem 0;
            border-top: 2px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            text-transform: uppercase;
            letter-spacing: .25em;
            text-align: center;
        }

        /* EVENT ARTICLE BLOCKS — image figure + headline + dateline + body */
        .nl-article {
            margin: 0 0 1.75rem;
            padding-bottom: 1.25rem;
            border-bottom: 1px dashed #c8b89a;
        }
        .nl-article:last-child { border-bottom: 0; padding-bottom: 0; }
        .nl-figure {
            float: right;
            width: 45%;
            margin: 0 0 .75rem 1.25rem;
            padding: 0;
        }
        .nl-figure img {
            display: block;
            width: 100%;
            height: auto;
            border: 1px solid #1a1a1a;
            filter: grayscale(.15) contrast(1.05);
        }
        .nl-figure figcaption {
            font-size: .78rem;
            font-style: italic;
            text-align: center;
            margin-top: .35rem;
            color: #555;
            letter-spacing: .02em;
        }
        .nl-headline {
            font-family: 'Georgia', 'Times New Roman', serif;
            font-size: 1.6rem;
            font-weight: 800;
            margin: 0 0 .25rem;
            line-height: 1.15;
            letter-spacing: -.005em;
        }
        .nl-dateline {
            font-size: .8rem;
            text-transform: uppercase;
            letter-spacing: .12em;
            margin: 0 0 .6rem;
        }
        .nl-body {
            margin: 0;
            text-align: justify;
            hyphens: auto;
            font-size: 1rem;
            line-height: 1.6;
        }
        /* Drop-cap on the first article's body — Sunday-paper touch */
        .curated-section .nl-article:first-of-type .nl-body::first-letter {
            float: left;
            font-size: 3.4rem;
            line-height: .85;
            padding: .2rem .55rem 0 0;
            font-weight: 900;
        }
        .nl-article::after { content: ''; display: block; clear: both; }

        /* Generic section body fallback (list-style sections like clubs, certs, faculty) */
        .curated-section-body {
            font-size: 1rem;
            column-count: 2;
            column-gap: 2rem;
            column-rule: 1px solid #e8dcc0;
        }
        .curated-section-body p,
        .curated-section-body ul,
        .curated-section-body ol {
            break-inside: avoid;
            margin: 0 0 .85rem;
        }
        .curated-section-body ul,
        .curated-section-body ol { padding-left: 1.2em; }
        .curated-section-body li { margin: .25rem 0; }
        /* Events section already has its own article layout — disable columns there. */
        .curated-section--events .curated-section-body { column-count: 1; }

        @media (max-width: 720px) {
            .curated-newsletter { padding: 1.5rem; }
            .curated-cover img  { margin: -1.5rem -1.5rem 1.5rem; width: calc(100% + 3rem); max-height: 200px; }
            .curated-title      { font-size: 1.9rem; }
            .nl-figure          { float: none; width: 100%; margin: 0 0 .75rem; }
            .curated-section-body { column-count: 1; }
        }
    </style>
</head>
<body>
    <header class="newsletter-page-header" style="display:flex;justify-content:space-between;align-items:center;">
        <a href="/" class="brand">
            <i class="fas fa-newspaper"></i>
            Department Newsletter
        </a>
        <a href="/newsletter/archive" style="color:#fff;text-decoration:underline;font-weight:500;">
            <i class="fas fa-book"></i> Browse all past issues
        </a>
    </header>

    <div class="newsletter-page-body">
        <div class="newsletter-selector">
            <h2 class="selector-title">
                <i class="fas fa-calendar-alt"></i>
                Generate Department Newsletter
            </h2>

            <form id="newsletterForm">
                <div class="form-row-3">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select class="form-control" id="department" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="month">Month</label>
                        <select class="form-control" id="month" required>
                            <option value="">Select Month</option>
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <select class="form-control" id="year" required>
                            <option value="">Select Year</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions" style="justify-content: center;">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-file-pdf"></i>
                        Generate Newsletter
                    </button>
                </div>
            </form>
        </div>

        <div class="newsletter-actions-bar" id="newsletterActions" style="display: none;">
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; width: 100%;">
                <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Print PDF
                </button>
                <button class="btn btn-success" onclick="downloadNewsletter()">
                    <i class="fas fa-download"></i> Download HTML
                </button>
                <button class="btn btn-secondary" onclick="shareNewsletter()">
                    <i class="fas fa-share"></i> Share Link
                </button>
            </div>
        </div>

        <div class="loading-overlay" id="loadingSpinner" style="display: none; position: static; background: transparent;">
            <div style="text-align: center;">
                <div class="loading-spinner"></div>
                <h5 style="margin-top: var(--space-3);">Generating Newsletter...</h5>
                <p class="t-text-muted">Please wait while we compile your department events.</p>
            </div>
        </div>

        <div id="newsletterContent"></div>

        <!-- Subscribe form (Phase 3.2) -->
        <section class="newsletter-subscribe" style="margin-top: var(--space-7); padding: var(--space-5) var(--space-6); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md);">
            <h3 style="margin: 0 0 var(--space-2); display:flex; align-items:center; gap:.5rem;">
                <i class="fas fa-envelope-open-text"></i> Subscribe to updates
            </h3>
            <p class="t-text-muted" style="margin: 0 0 var(--space-3);">Get the next published newsletter delivered to your inbox.</p>
            <form id="subscribeForm" style="display:flex; gap: var(--space-3); flex-wrap: wrap; align-items: flex-end;">
                <div class="form-group" style="margin: 0; min-width: 200px;">
                    <label class="form-label" for="subDept">Department</label>
                    <select id="subDept" class="form-control" required>
                        <option value="">Select Department</option>
                    </select>
                </div>
                <div class="form-group" style="margin: 0; min-width: 220px; flex: 1;">
                    <label class="form-label" for="subEmail">Email</label>
                    <input type="email" id="subEmail" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group" style="margin: 0; min-width: 180px;">
                    <label class="form-label" for="subName">Name (optional)</label>
                    <input type="text" id="subName" class="form-control" placeholder="Full name">
                </div>
                <button type="submit" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Subscribe</button>
            </form>
            <p id="subscribeMessage" class="t-text-muted" style="margin: var(--space-3) 0 0; font-size:.9rem;"></p>
        </section>
    </div>

    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/newsletter.js"></script>
    <script src="/js/newsletter-subscribe.js"></script>
</body>
</html>
