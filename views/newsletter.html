<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Newsletter</title>
    <link rel="stylesheet" href="/css/theme.css">
    <link rel="stylesheet" href="/css/components.css">
    <link rel="stylesheet" href="/css/hod.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .newsletter-page-header {
            background: var(--gradient-primary);
            color: var(--color-text-inverse);
            padding: var(--space-5) var(--space-7);
            box-shadow: var(--shadow-sm);
        }

        .newsletter-page-header .brand {
            display: flex;
            align-items: center;
            gap: var(--space-2);
            color: var(--color-text-inverse);
            font-weight: 700;
            font-size: var(--fs-lg);
            text-decoration: none;
        }

        .newsletter-page-body {
            max-width: 1080px;
            margin: 0 auto;
            padding: var(--space-7) var(--space-6);
        }

        .newsletter-page-body .form-row-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-4);
        }

        @media (max-width: 767.98px) {
            .newsletter-page-body .form-row-3 { grid-template-columns: 1fr; }
        }

        .newsletter-actions-bar {
            position: sticky;
            top: var(--space-3);
            z-index: var(--z-sticky);
            background: var(--color-surface);
            border: 1px solid var(--color-border);
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            padding: var(--space-3) var(--space-4);
            margin-bottom: var(--space-5);
            display: none;
            justify-content: center;
            gap: var(--space-3);
            flex-wrap: wrap;
        }

        .newsletter-actions-bar.show { display: flex; }

        @media print {
            .newsletter-page-header,
            .newsletter-selector,
            .newsletter-actions-bar { display: none !important; }
            body { background: white !important; }
            .newsletter-page-body { padding: 0; max-width: none; }
        }
    </style>
</head>
<body>
    <header class="newsletter-page-header">
        <a href="/" class="brand">
            <i class="fas fa-newspaper"></i>
            Department Newsletter
        </a>
    </header>

    <div class="newsletter-page-body">
        <div class="newsletter-selector">
            <h2 class="selector-title">
                <i class="fas fa-calendar-alt"></i>
                Generate Department Newsletter
            </h2>

            <form id="newsletterForm">
                <div class="form-row-3">
                    <div class="form-group">
                        <label for="department">Department</label>
                        <select class="form-control" id="department" required>
                            <option value="">Select Department</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="month">Month</label>
                        <select class="form-control" id="month" required>
                            <option value="">Select Month</option>
                            <option value="0">January</option>
                            <option value="1">February</option>
                            <option value="2">March</option>
                            <option value="3">April</option>
                            <option value="4">May</option>
                            <option value="5">June</option>
                            <option value="6">July</option>
                            <option value="7">August</option>
                            <option value="8">September</option>
                            <option value="9">October</option>
                            <option value="10">November</option>
                            <option value="11">December</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="year">Year</label>
                        <select class="form-control" id="year" required>
                            <option value="">Select Year</option>
                        </select>
                    </div>
                </div>

                <div class="form-actions" style="justify-content: center;">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="fas fa-file-pdf"></i>
                        Generate Newsletter
                    </button>
                </div>
            </form>
        </div>

        <div class="newsletter-actions-bar" id="newsletterActions" style="display: none;">
            <div style="display: flex; gap: var(--space-3); flex-wrap: wrap; justify-content: center; width: 100%;">
                <button class="btn btn-secondary" onclick="window.print()">
                    <i class="fas fa-print"></i> Print PDF
                </button>
                <button class="btn btn-success" onclick="downloadNewsletter()">
                    <i class="fas fa-download"></i> Download HTML
                </button>
                <button class="btn btn-secondary" onclick="shareNewsletter()">
                    <i class="fas fa-share"></i> Share Link
                </button>
            </div>
        </div>

        <div class="loading-overlay" id="loadingSpinner" style="display: none; position: static; background: transparent;">
            <div style="text-align: center;">
                <div class="loading-spinner"></div>
                <h5 style="margin-top: var(--space-3);">Generating Newsletter...</h5>
                <p class="t-text-muted">Please wait while we compile your department events.</p>
            </div>
        </div>

        <div id="newsletterContent"></div>
    </div>

    <script src="/js/ui.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/newsletter.js"></script>
</body>
</html>
